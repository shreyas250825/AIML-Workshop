<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Workshop Assistant</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #252540);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 95%;
  max-width: 700px;
  height: 90vh;
  background: #ffffff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  overflow: hidden;
}

.header {
  padding: 20px;
  background: #4f46e5;
  color: white;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

.chat-box {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  background: #f5f7fb;
}

.message {
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 15px;
  max-width: 75%;
  line-height: 1.4;
  word-wrap: break-word;
}

.user {
  background: #4f46e5;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 5px;
}

.bot {
  background: #e5e7eb;
  color: #111;
  align-self: flex-start;
  border-bottom-left-radius: 5px;
}

.input-area {
  display: flex;
  padding: 15px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 15px;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4338ca;
}

.loading {
  font-style: italic;
  color: gray;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">AI Workshop Assistant 🤖</div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// Replace "paste_your_api_key_here" with your actual API key from Google AI Studio
const API_KEY = "paste_your_api_key_here"; 
const MODEL = "gemini-2.5-flash";

const chatBox = document.getElementById("chatBox");

function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.classList.add("message", className);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const userInput = document.getElementById("userInput");
  const message = userInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  userInput.value = "";

  const loadingMsg = document.createElement("div");
  loadingMsg.classList.add("loading");
  loadingMsg.innerText = "AI is typing...";
  chatBox.appendChild(loadingMsg);

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: message }]
            }
          ]
        })
      }
    );

    const data = await response.json();

    chatBox.removeChild(loadingMsg);

    if (data.candidates) {
      const reply = data.candidates[0].content.parts[0].text;
      addMessage(reply, "bot");
    } else {
      addMessage("Error: " + JSON.stringify(data), "bot");
    }

  } catch (error) {
    chatBox.removeChild(loadingMsg);
    addMessage("Network error. Check API key.", "bot");
  }
}

// Add welcome message when page loads
addMessage("Welcome to Circuitopia Chat Bot, How can I help you today?", "bot");

// Add Enter key listener
document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
